<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TNR Admin — Class Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" href="images/TNR Favicon_green.jpg">
<style>
  :root {
    --bark: #2C1F0E;
    --moss: #4A5E3A;
    --stone: #8C7B6B;
    --clay: #C4865A;
    --cream: #F2EDE4;
    --fog: #D6CEBF;
    --ember: #D4521A;
    --pine: #2D4A2D;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow', sans-serif; background: #1a0f06; color: var(--cream); min-height: 100vh; }

  /* ── LOGIN ── */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a0f06 0%, #2C1F0E 100%);
  }

  .login-box {
    background: #2C1F0E;
    border: 1px solid rgba(196,134,90,0.3);
    padding: 3rem 2.5rem;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .login-box img {
    width: 90px; height: 90px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 1.5rem;
  }

  .login-box h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--cream);
    margin-bottom: 0.4rem;
  }

  .login-box p {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--clay);
    margin-bottom: 2rem;
  }

  .login-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.12);
    padding: 0.85rem 1rem;
    font-family: 'Barlow', sans-serif;
    font-size: 1rem;
    color: var(--cream);
    outline: none;
    text-align: center;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }

  .login-input:focus { border-color: var(--clay); }

  .login-btn {
    width: 100%;
    background: var(--ember);
    color: var(--cream);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.9rem;
    border: none;
    cursor: pointer;
    transition: background 0.2s;
  }

  .login-btn:hover { background: var(--clay); }

  .login-error {
    color: #e07070;
    font-size: 0.85rem;
    margin-top: 0.75rem;
    display: none;
  }

  /* ── ADMIN UI ── */
  #adminScreen { display: none; }

  .admin-nav {
    background: var(--bark);
    border-bottom: 2px solid var(--clay);
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .admin-brand {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--cream);
  }

  .admin-brand img {
    width: 36px; height: 36px;
    border-radius: 50%;
    object-fit: cover;
  }

  .admin-brand span { color: var(--clay); }

  .admin-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: var(--ember);
    color: white;
    padding: 0.2rem 0.6rem;
    margin-left: 0.5rem;
  }

  .logout-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--stone);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.4rem 1rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .logout-btn:hover { border-color: var(--clay); color: var(--clay); }

  .admin-body {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 2rem;
  }

  .admin-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .admin-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--cream);
  }

  .admin-title small {
    display: block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--clay);
    font-weight: 400;
    margin-bottom: 0.25rem;
  }

  .add-btn {
    background: var(--ember);
    color: var(--cream);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.85rem 1.75rem;
    border: none;
    cursor: pointer;
    transition: background 0.2s;
  }

  .add-btn:hover { background: var(--clay); }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 2px;
    background: rgba(255,255,255,0.06);
    margin-bottom: 2.5rem;
  }

  .stat-card {
    background: #2C1F0E;
    padding: 1.5rem;
    text-align: center;
  }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    color: var(--clay);
    line-height: 1;
  }

  .stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stone);
    margin-top: 0.4rem;
  }

  /* Class list */
  .class-list { display: flex; flex-direction: column; gap: 2px; }

  .class-card {
    background: #2C1F0E;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 1.5rem;
    align-items: center;
    padding: 1.25rem 1.5rem;
    border-left: 4px solid var(--clay);
    transition: background 0.15s;
  }

  .class-card:hover { background: #3a2a18; }
  .class-card.past { opacity: 0.5; border-left-color: var(--stone); }

  .class-card.cat-camping { border-left-color: #7ec87e; }
  .class-card.cat-preparedness { border-left-color: var(--ember); }
  .class-card.cat-hiking { border-left-color: #6B8EA8; }
  .class-card.cat-first-aid { border-left-color: #e07070; }

  .class-date-block { text-align: center; min-width: 52px; }
  .class-date-block .day { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--clay); line-height: 1; }
  .class-date-block .mon { font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--stone); }

  .class-info h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.15rem; font-weight: 700; color: var(--cream); }
  .class-info p { font-size: 0.85rem; color: var(--stone); margin-top: 0.2rem; }

  .class-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.15rem 0.5rem;
    border: 1px solid;
    margin-top: 0.35rem;
    display: inline-block;
  }

  .tag-camping { color: #7ec87e; border-color: #7ec87e; }
  .tag-preparedness { color: var(--clay); border-color: var(--clay); }
  .tag-hiking { color: #6B8EA8; border-color: #6B8EA8; }
  .tag-first-aid { color: #e07070; border-color: #e07070; }

  .class-actions { display: flex; gap: 0.5rem; }

  .btn-edit {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--fog);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.4rem 0.85rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    white-space: nowrap;
  }

  .btn-edit:hover { border-color: var(--clay); color: var(--clay); }

  .btn-del {
    background: transparent;
    border: 1px solid rgba(192,57,43,0.4);
    color: #e07070;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.4rem 0.85rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }

  .btn-del:hover { background: #c0392b; color: white; border-color: #c0392b; }

  .section-divider {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--stone);
    padding: 1rem 0 0.5rem;
    border-top: 1px solid rgba(255,255,255,0.07);
    margin-top: 1rem;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,5,2,0.9);
    z-index: 9000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.active { opacity: 1; pointer-events: all; }

  .modal {
    background: #2C1F0E;
    border: 1px solid rgba(196,134,90,0.25);
    max-width: 540px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 2.5rem;
    position: relative;
    transform: translateY(16px);
    transition: transform 0.25s;
  }

  .modal-overlay.active .modal { transform: translateY(0); }

  .modal-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: var(--stone);
    line-height: 1;
  }

  .modal-close:hover { color: var(--cream); }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--cream);
    margin-bottom: 1.75rem;
  }

  .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.25rem; }

  .form-group label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stone);
    font-weight: 600;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.12);
    padding: 0.7rem 0.9rem;
    font-family: 'Barlow', sans-serif;
    font-size: 0.95rem;
    color: var(--cream);
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--clay); }

  .form-group select option { background: #2C1F0E; }
  .form-group textarea { resize: vertical; min-height: 80px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  .form-submit {
    width: 100%;
    background: var(--ember);
    color: var(--cream);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.9rem;
    border: none;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: background 0.2s;
  }

  .form-submit:hover { background: var(--clay); }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--stone);
  }

  .empty-state p { font-size: 1rem; margin-top: 0.5rem; }

  @media (max-width: 600px) {
    .class-card { grid-template-columns: auto 1fr; }
    .class-actions { grid-column: span 2; }
    .form-row { grid-template-columns: 1fr; }
  }

  /* ── TABS ── */
  .admin-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 2.5rem;
    background: rgba(255,255,255,0.04);
    padding: 4px;
    width: fit-content;
  }
  .tab-btn {
    background: transparent;
    border: none;
    color: var(--stone);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.6rem 1.75rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .tab-btn.active { background: var(--bark); color: var(--cream); }
  .tab-btn:hover:not(.active) { color: var(--fog); }
  .tab-badge {
    display: inline-block;
    background: var(--ember);
    color: white;
    border-radius: 10px;
    font-size: 0.65rem;
    padding: 0.1rem 0.45rem;
    margin-left: 0.4rem;
    min-width: 18px;
    text-align: center;
    vertical-align: middle;
  }
  .tab-badge:empty { display: none; }

  /* ── PHOTO GRID ── */
  .staging-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--stone);
    padding: 1rem 0 0.75rem;
    border-top: 1px solid rgba(255,255,255,0.07);
    margin-top: 1rem;
    margin-bottom: 1rem;
  }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 3px;
    margin-bottom: 2.5rem;
  }
  .photo-card {
    position: relative;
    aspect-ratio: 4/3;
    overflow: hidden;
    background: #1a0f06;
  }
  .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-card-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0.6rem 0.75rem;
    background: linear-gradient(transparent, rgba(10,5,2,0.88));
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fog);
  }
  .photo-card-date {
    font-family: 'Barlow', sans-serif;
    font-size: 0.65rem;
    color: var(--stone);
    letter-spacing: 0;
    text-transform: none;
    margin-top: 0.2rem;
  }
  .photo-card-actions {
    position: absolute;
    top: 0.4rem; right: 0.4rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .btn-approve {
    background: rgba(46,74,46,0.88);
    border: 1px solid #7ec87e;
    color: #7ec87e;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn-approve:hover { background: #4A5E3A; color: white; border-color: #7ec87e; }
  .btn-decline {
    background: rgba(80,20,20,0.88);
    border: 1px solid rgba(224,112,112,0.6);
    color: #e07070;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .btn-decline:hover { background: #c0392b; color: white; border-color: #c0392b; }
  .photo-empty {
    color: var(--stone);
    font-size: 0.9rem;
    font-family: 'Barlow', sans-serif;
    padding: 2rem 0;
  }
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="loginScreen">
  <div class="login-box">
    <img src="images/logo.jpg" alt="Tennessee Readiness Logo">
    <h1>Tennessee Readiness</h1>
    <p>Admin Access</p>
    <input type="password" class="login-input" id="passwordInput" placeholder="Enter password" onkeydown="if(event.key==='Enter') attemptLogin()">
    <button class="login-btn" onclick="attemptLogin()">Sign In</button>
    <div class="login-error" id="loginError">Incorrect password. Please try again.</div>
  </div>
</div>

<!-- ── ADMIN SCREEN ── -->
<div id="adminScreen">

  <nav class="admin-nav">
    <div class="admin-brand">
      <img src="images/logo.jpg" alt="Logo">
      Tennessee <span>Readiness</span>
      <span class="admin-badge">Admin</span>
    </div>
    <button class="logout-btn" onclick="logout()">Log Out</button>
  </nav>

  <div class="admin-body">

    <!-- ── TABS ── -->
    <div class="admin-tabs">
      <button class="tab-btn active" id="tab-btn-classes" onclick="switchTab('classes')">Classes</button>
      <button class="tab-btn" id="tab-btn-photos" onclick="switchTab('photos')">
        Photos <span class="tab-badge" id="pendingBadge"></span>
      </button>
    </div>

    <!-- ── CLASSES TAB ── -->
    <div id="tab-classes">
      <div class="admin-header">
        <div class="admin-title">
          <small>Class Management</small>
          Schedule
        </div>
        <button class="add-btn" onclick="openAddModal()">＋ Add New Class</button>
      </div>
      <div class="stats-row" id="statsRow"></div>
      <div id="classList"></div>
    </div>

    <!-- ── PHOTOS TAB ── -->
    <div id="tab-photos" style="display:none;">
      <div class="admin-header">
        <div class="admin-title">
          <small>Porch Gallery</small>
          Photo Staging
        </div>
      </div>
      <div class="stats-row" id="photoStatsRow"></div>

      <div class="staging-title" style="border-top:none; padding-top:0;">Pending Review <span id="pendingCount" style="color:var(--ember);"></span></div>
      <div class="photo-grid" id="pendingGrid"></div>

      <div class="staging-title">Approved &amp; Live <span id="approvedCount" style="color:#7ec87e;"></span></div>
      <div class="photo-grid" id="approvedGrid"></div>
    </div>

  </div>
</div>

<!-- ── ADD / EDIT MODAL ── -->
<div class="modal-overlay" id="classModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">Add New Class</h2>
    <div class="form-group">
      <label>Class Title *</label>
      <input type="text" id="f-title" placeholder="e.g. Wilderness First Aid Basics">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date *</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-group">
        <label>Category *</label>
        <select id="f-cat">
          <option value="">Select category</option>
          <option value="camping">🏕️ Camping</option>
          <option value="preparedness">🛡️ Preparedness</option>
          <option value="hiking">🥾 Hiking</option>
          <option value="first-aid">🩹 First Aid</option>
          <option value="self-defense">🥋 Self Defense</option>
          <option value="homeschool">📚 Home School</option>
          <option value="arts-crafts">🎨 Arts &amp; Crafts</option>
          <option value="nutrition">🥗 Nutrition</option>
          <option value="cooking">🍳 Cooking</option>
          <option value="bible-study">✝️ Bible Study</option>
          <option value="private">🔒 Private Function</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Start Time</label>
        <input type="time" id="f-start">
      </div>
      <div class="form-group">
        <label>End Time</label>
        <input type="time" id="f-end">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Instructor</label>
        <input type="text" id="f-instructor" placeholder="Instructor name">
      </div>
      <div class="form-group">
        <label>Max Capacity</label>
        <input type="number" id="f-capacity" placeholder="e.g. 20" min="1">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="f-desc" placeholder="What will participants learn?"></textarea>
    </div>
    <button class="form-submit" onclick="saveClass()">Save Class</button>
  </div>
</div>

<script>
const SESSION_KEY = 'tnr_admin_session';
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const CAT_LABELS = { camping: '🏕️ Camping', preparedness: '🛡️ Preparedness', hiking: '🥾 Hiking', 'first-aid': '🩹 First Aid', 'self-defense': '🥋 Self Defense', homeschool: '📚 Home School', 'arts-crafts': '🎨 Arts & Crafts', nutrition: '🥗 Nutrition', cooking: '🍳 Cooking', 'bible-study': '✝️ Bible Study', private: '🔒 Private Function' };

let classes = [];
let editingId = null;

// ── AUTH ──
async function attemptLogin() {
  const val = document.getElementById('passwordInput').value;
  const res = await fetch('/api/auth', {
    headers: { 'Authorization': `Bearer ${val}` }
  });
  if (res.ok) {
    sessionStorage.setItem(SESSION_KEY, val);
    showAdmin();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('passwordInput').value = '';
    document.getElementById('passwordInput').focus();
  }
}

function logout() {
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('passwordInput').value = '';
}

async function showAdmin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'block';
  await loadClasses();
  renderAll();
  updatePendingBadge();
}

// ── DATA ──
async function loadClasses() {
  const res = await fetch('/api/classes');
  classes = await res.json();
}

async function saveClasses() {
  const pw = sessionStorage.getItem(SESSION_KEY);
  await fetch('/api/classes', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${pw}`
    },
    body: JSON.stringify(classes)
  });
}

// ── RENDER ──
function renderAll() {
  renderStats();
  renderList();
}

function renderStats() {
  const today = new Date(); today.setHours(0,0,0,0);
  const upcoming = classes.filter(c => new Date(c.date + 'T00:00:00') >= today);
  const cats = [...new Set(classes.map(c => c.cat))];
  const thisMonth = classes.filter(c => {
    const d = new Date(c.date + 'T00:00:00');
    return d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
  });

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num">${classes.length}</div><div class="stat-label">Total Classes</div></div>
    <div class="stat-card"><div class="stat-num">${upcoming.length}</div><div class="stat-label">Upcoming</div></div>
    <div class="stat-card"><div class="stat-num">${thisMonth.length}</div><div class="stat-label">This Month</div></div>
    <div class="stat-card"><div class="stat-num">${cats.length}</div><div class="stat-label">Categories</div></div>
  `;
}

function renderList() {
  const today = new Date(); today.setHours(0,0,0,0);
  const sorted = [...classes].sort((a,b) => a.date.localeCompare(b.date));
  const upcoming = sorted.filter(c => new Date(c.date + 'T00:00:00') >= today);
  const past = sorted.filter(c => new Date(c.date + 'T00:00:00') < today).reverse();

  let html = '';

  if (upcoming.length === 0 && past.length === 0) {
    html = `<div class="empty-state"><div style="font-size:3rem;">📅</div><p>No classes scheduled yet.<br>Click "Add New Class" to get started.</p></div>`;
  } else {
    if (upcoming.length > 0) {
      html += `<div class="section-divider">Upcoming Classes (${upcoming.length})</div>`;
      html += '<div class="class-list">' + upcoming.map(c => classCard(c, false)).join('') + '</div>';
    }
    if (past.length > 0) {
      html += `<div class="section-divider" style="margin-top:2rem;">Past Classes (${past.length})</div>`;
      html += '<div class="class-list">' + past.map(c => classCard(c, true)).join('') + '</div>';
    }
  }

  document.getElementById('classList').innerHTML = html;
}

function classCard(ev, isPast) {
  const d = new Date(ev.date + 'T00:00:00');
  const day = d.getDate();
  const mon = MONTHS[d.getMonth()].slice(0,3).toUpperCase();
  const timeStr = ev.start ? formatTime(ev.start) + (ev.end ? ' – ' + formatTime(ev.end) : '') : 'Time TBD';
  const tagClass = `tag-${ev.cat}`;
  const catLabel = CAT_LABELS[ev.cat] || ev.cat;
  return `
    <div class="class-card cat-${ev.cat}${isPast ? ' past' : ''}">
      <div class="class-date-block">
        <div class="day">${day}</div>
        <div class="mon">${mon}</div>
      </div>
      <div class="class-info">
        <h3>${ev.title}</h3>
        <p>${timeStr}${ev.instructor ? ' · ' + ev.instructor : ''}${ev.capacity ? ' · ' + ev.capacity + ' max' : ''}</p>
        <span class="class-tag ${tagClass}">${catLabel}</span>
      </div>
      <div class="class-actions">
        <button class="btn-edit" onclick="openEditModal(${ev.id})">Edit</button>
        <button class="btn-del" onclick="deleteClass(${ev.id})">Delete</button>
      </div>
    </div>`;
}

function formatTime(t) {
  const [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hr = h % 12 || 12;
  return `${hr}:${String(m).padStart(2,'0')} ${ampm}`;
}

// ── MODAL ──
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add New Class';
  clearForm();
  document.getElementById('classModal').classList.add('active');
}

function openEditModal(id) {
  editingId = id;
  const ev = classes.find(c => c.id === id);
  if (!ev) return;
  document.getElementById('modalTitle').textContent = 'Edit Class';
  document.getElementById('f-title').value = ev.title || '';
  document.getElementById('f-date').value = ev.date || '';
  document.getElementById('f-cat').value = ev.cat || '';
  document.getElementById('f-start').value = ev.start || '';
  document.getElementById('f-end').value = ev.end || '';
  document.getElementById('f-instructor').value = ev.instructor || '';
  document.getElementById('f-capacity').value = ev.capacity || '';
  document.getElementById('f-desc').value = ev.desc || '';
  document.getElementById('classModal').classList.add('active');
}

function closeModal() {
  document.getElementById('classModal').classList.remove('active');
  clearForm();
  editingId = null;
}

function clearForm() {
  ['f-title','f-date','f-cat','f-start','f-end','f-instructor','f-capacity','f-desc'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

async function saveClass() {
  const title = document.getElementById('f-title').value.trim();
  const date = document.getElementById('f-date').value;
  const cat = document.getElementById('f-cat').value;
  if (!title || !date || !cat) { alert('Please fill in Title, Date, and Category.'); return; }

  const data = {
    title, date, cat,
    start: document.getElementById('f-start').value,
    end: document.getElementById('f-end').value,
    instructor: document.getElementById('f-instructor').value.trim(),
    capacity: document.getElementById('f-capacity').value,
    desc: document.getElementById('f-desc').value.trim(),
  };

  if (editingId) {
    const idx = classes.findIndex(c => c.id === editingId);
    if (idx !== -1) classes[idx] = { ...classes[idx], ...data };
  } else {
    data.id = Date.now();
    classes.push(data);
  }

  await saveClasses();
  closeModal();
  renderAll();
}

async function deleteClass(id) {
  const ev = classes.find(c => c.id === id);
  if (!ev) return;
  if (!confirm(`Delete "${ev.title}"? This cannot be undone.`)) return;
  classes = classes.filter(c => c.id !== id);
  await saveClasses();
  renderAll();
}

// Close modal on overlay click
document.getElementById('classModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── TABS ────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-classes').style.display = tab === 'classes' ? 'block' : 'none';
  document.getElementById('tab-photos').style.display  = tab === 'photos'  ? 'block' : 'none';
  document.getElementById('tab-btn-classes').classList.toggle('active', tab === 'classes');
  document.getElementById('tab-btn-photos').classList.toggle('active',  tab === 'photos');
  if (tab === 'photos') renderPhotos();
}

// ── PHOTO STAGING ────────────────────────────────────────────────────────────
const PENDING_KEY  = 'tnr_pending_photos';
const APPROVED_KEY = 'tnr_approved_photos';

function loadPhotos() {
  return {
    pending:  JSON.parse(localStorage.getItem(PENDING_KEY)  || '[]'),
    approved: JSON.parse(localStorage.getItem(APPROVED_KEY) || '[]'),
  };
}

function savePhotos(pending, approved) {
  localStorage.setItem(PENDING_KEY,  JSON.stringify(pending));
  localStorage.setItem(APPROVED_KEY, JSON.stringify(approved));
}

function updatePendingBadge() {
  const pending = JSON.parse(localStorage.getItem(PENDING_KEY) || '[]');
  const badge = document.getElementById('pendingBadge');
  badge.textContent = pending.length > 0 ? pending.length : '';
}

function approvePhoto(id) {
  let { pending, approved } = loadPhotos();
  const photo = pending.find(p => p.id === id);
  if (!photo) return;
  pending  = pending.filter(p => p.id !== id);
  approved = [...approved, { ...photo, approved: new Date().toISOString() }];
  savePhotos(pending, approved);
  renderPhotos();
  updatePendingBadge();
}

function declinePhoto(id) {
  if (!confirm('Decline and remove this photo?')) return;
  let { pending, approved } = loadPhotos();
  pending = pending.filter(p => p.id !== id);
  savePhotos(pending, approved);
  renderPhotos();
  updatePendingBadge();
}

function deleteApprovedPhoto(id) {
  if (!confirm('Remove this photo from the public gallery?')) return;
  let { pending, approved } = loadPhotos();
  approved = approved.filter(p => p.id !== id);
  savePhotos(pending, approved);
  renderPhotos();
}

function renderPhotos() {
  const { pending, approved } = loadPhotos();

  // Stats
  document.getElementById('photoStatsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num" style="color:var(--ember);">${pending.length}</div><div class="stat-label">Pending Review</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#7ec87e;">${approved.length}</div><div class="stat-label">Live in Gallery</div></div>
  `;

  document.getElementById('pendingCount').textContent = `(${pending.length})`;
  document.getElementById('approvedCount').textContent = `(${approved.length})`;
  updatePendingBadge();

  // Pending grid
  const pendingGrid = document.getElementById('pendingGrid');
  if (pending.length === 0) {
    pendingGrid.innerHTML = '<p class="photo-empty">No photos awaiting review.</p>';
  } else {
    pendingGrid.innerHTML = pending.map(p => {
      const label = p.name.replace(/\.[^/.]+$/, '').replace(/[-_]/g, ' ');
      const date  = new Date(p.submitted).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
      return `
        <div class="photo-card">
          <img src="${p.src}" alt="${label}">
          <div class="photo-card-label">${label}<div class="photo-card-date">${date}</div></div>
          <div class="photo-card-actions">
            <button class="btn-approve" onclick="approvePhoto(${p.id})">✓ Approve</button>
            <button class="btn-decline" onclick="declinePhoto(${p.id})">✕ Decline</button>
          </div>
        </div>`;
    }).join('');
  }

  // Approved grid
  const approvedGrid = document.getElementById('approvedGrid');
  if (approved.length === 0) {
    approvedGrid.innerHTML = '<p class="photo-empty">No approved photos yet.</p>';
  } else {
    approvedGrid.innerHTML = approved.map(p => {
      const label = p.name.replace(/\.[^/.]+$/, '').replace(/[-_]/g, ' ');
      const date  = new Date(p.approved).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
      return `
        <div class="photo-card">
          <img src="${p.src}" alt="${label}">
          <div class="photo-card-label">${label}<div class="photo-card-date">Approved ${date}</div></div>
          <div class="photo-card-actions">
            <button class="btn-del" onclick="deleteApprovedPhoto(${p.id})">✕ Remove</button>
          </div>
        </div>`;
    }).join('');
  }
}

window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem(SESSION_KEY)) {
    showAdmin();
  }
  document.getElementById('passwordInput').focus();
});
</script>
